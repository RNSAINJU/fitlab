map $request_method $fitlab_login_limit_key {
    default "";
    POST    $binary_remote_addr;
}

limit_req_zone $fitlab_login_limit_key zone=fitlab_login:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=fitlab_general:10m rate=30r/s;

server {
    listen __FITLAB_NGINX_PORT__;
    listen [::]:__FITLAB_NGINX_PORT__;
    server_name __FITLAB_SERVER_NAME__;

    client_max_body_size 10M;
    limit_req_status 429;
    limit_req_log_level warn;

    location /static/ {
        alias /var/www/fitlab/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/fitlab/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /accounts/login/ {
        limit_req zone=fitlab_login burst=6 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }

    location / {
        limit_req zone=fitlab_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}
