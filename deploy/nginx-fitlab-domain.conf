# Fitlab domain vhost (port 80/443). Requires limit_req zones from nginx-fitlab.conf.
# Install with: sudo bash deploy/setup-domain.sh
#
# Cloudflare: set SSL/TLS mode to Full (strict). Origin has a Let's Encrypt cert on 443.

map $http_x_forwarded_proto $fitlab_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name __FITLAB_DOMAIN__ www.__FITLAB_DOMAIN__;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/fitlab/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /accounts/login/ {
        limit_req zone=fitlab_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fitlab_forwarded_proto;
        proxy_redirect off;
    }

    location / {
        limit_req zone=fitlab_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fitlab_forwarded_proto;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __FITLAB_DOMAIN__ www.__FITLAB_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__FITLAB_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__FITLAB_DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/fitlab/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /accounts/login/ {
        limit_req zone=fitlab_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        limit_req zone=fitlab_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
