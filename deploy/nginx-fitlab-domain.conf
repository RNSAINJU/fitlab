# Fitlab domain vhost (port 80/443). Requires limit_req zones from nginx-fitlab.conf.
# Install with: sudo bash deploy/setup-domain.sh

server {
    listen 80;
    listen [::]:80;
    server_name __FITLAB_DOMAIN__ www.__FITLAB_DOMAIN__;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/fitlab/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /accounts/login/ {
        limit_req zone=fitlab_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        limit_req zone=fitlab_general burst=50 nodelay;
        proxy_pass http://127.0.0.1:__FITLAB_GUNICORN_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
