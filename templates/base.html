<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default:'light' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="fitlab-authenticated" content="{% if user.is_authenticated %}1{% else %}0{% endif %}">
  <meta name="fitlab-theme" content="{{ theme|default:'light' }}">
  <title>{% block title %}{{ site_config.site_name }}{% endblock %}</title>
  {% load static %}
  <script>
    (function () {
      try {
        var authMeta = document.querySelector('meta[name="fitlab-authenticated"]');
        var themeMeta = document.querySelector('meta[name="fitlab-theme"]');
        var authenticated = authMeta && authMeta.getAttribute("content") === "1";
        var serverTheme = themeMeta && themeMeta.getAttribute("content");
        if (authenticated && (serverTheme === "light" || serverTheme === "dark")) {
          document.documentElement.setAttribute("data-theme", serverTheme);
          localStorage.setItem("fitlab-theme", serverTheme);
          return;
        }
        var stored = localStorage.getItem("fitlab-theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'css/fitlab.css' %}?v=7">
  <link rel="stylesheet" href="{% static 'css/themes.css' %}?v=5">
  {% block extra_head %}{% endblock %}
</head>
<body data-authenticated="{% if user.is_authenticated %}true{% else %}false{% endif %}">
  <div class="theme-toggle-portal" aria-hidden="false">
    {% include "includes/theme_toggle.html" %}
  </div>
  {% block body %}{% endblock %}
  <script src="{% static 'js/theme.js' %}?v=2"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
