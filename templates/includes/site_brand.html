{% load static %}
<span class="site-brand{% if extra_class %} site-brand--{{ extra_class|cut:'site-logo--' }}{% endif %}">
{% if site_config.logo %}
  <img
    src="{{ site_config.logo.url }}"
    alt="{{ site_config.site_name }}"
    class="site-logo{% if extra_class %} {{ extra_class }}{% endif %}"
  >
{% else %}
  <img
    src="{% static 'images/the-fit-lab-logo.jpg' %}"
    alt="{{ site_config.site_name }}"
    class="site-logo{% if extra_class %} {{ extra_class }}{% endif %}"
  >
{% endif %}
</span>
