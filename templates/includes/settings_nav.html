<nav class="settings-nav" aria-label="Settings sections">
  <label class="settings-nav__label" for="settings-section">Section</label>
  <div class="settings-nav__select-wrap">
    <select id="settings-section" class="settings-nav__select" data-settings-nav>
      <option value="{% url 'admin_portal:site_settings' %}" {% if settings_section == 'general' %}selected{% endif %}>
        General — Branding &amp; data
      </option>
      {% if request.user.is_superuser %}
      <option value="{% url 'admin_portal:role_management' %}" {% if settings_section == 'roles' %}selected{% endif %}>
        Roles &amp; management
      </option>
      {% endif %}
    </select>
    <span class="settings-nav__chevron" aria-hidden="true"></span>
  </div>
</nav>
